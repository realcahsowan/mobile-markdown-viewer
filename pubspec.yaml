name: mobile_markdown_viewer
description: A lightweight, privacy-focused Markdown Reader & Editor for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.6
  markdown: ^7.2.2
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  flutter_riverpod: ^2.6.1
  file_picker: ^8.1.7
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1E1E2E"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
